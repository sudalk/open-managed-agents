name: Deploy Lane

on:
  workflow_dispatch:
    inputs:
      lane_name:
        description: 'Lane name (lowercase alphanumeric + dashes, e.g. pr-123 or feat-foo)'
        required: true
        type: string
      git_ref:
        description: 'Git ref to deploy (branch/tag/SHA). Defaults to the workflow run ref.'
        required: false
        type: string
      confirm_shared_data:
        description: 'Confirm: this lane WRITES TO PROD KV / D1 / R2 (data is shared)'
        required: true
        type: boolean
        default: false
      workers:
        description: 'Subset of workers to redeploy (comma-separated): main,agent,integrations. Default = all (full lane bring-up).'
        required: false
        type: string
        default: 'all'

# Allow concurrent deploys of different lanes; serialize within a single lane.
concurrency:
  group: deploy-lane-${{ inputs.lane_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Verify confirm
        run: |
          if [ "${{ inputs.confirm_shared_data }}" != "true" ]; then
            echo "::error::Must check confirm_shared_data — lanes write to prod KV/D1/R2."
            exit 1
          fi

      - name: Validate lane name
        run: |
          LANE='${{ inputs.lane_name }}'
          if ! echo "$LANE" | grep -qE '^[a-z0-9][a-z0-9-]{1,30}$'; then
            echo "::error::lane_name must match ^[a-z0-9][a-z0-9-]{1,30}$ (got: '$LANE')"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build console
        # apps/main/wrangler.lane-*.jsonc has assets.directory = ../console/dist;
        # the lane main worker won't deploy without these built artifacts.
        run: pnpm --filter managed-agents-console build

      - name: Generate lane wrangler configs
        env:
          CF_SUBDOMAIN: ${{ vars.CF_SUBDOMAIN }}
        run: node scripts/lane-generate.mjs '${{ inputs.lane_name }}'

      # Memory subsystem (Anthropic Managed Agents Memory contract): the lane
      # workers reference an R2 bucket + Cloudflare Queue that must exist
      # before deploy. All three commands are idempotent — second invocation
      # no-ops with a non-zero exit that we swallow with `|| true`. The R2
      # event subscription wires bucket PUTs/DELETEs to the queue so the
      # consumer in apps/main can reflect agent FUSE writes back into D1.
      - name: Ensure memory subsystem infra exists (idempotent)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd apps/main
          npx wrangler r2 bucket create managed-agents-memory-staging 2>&1 \
            | tee /tmp/r2-create.log || true
          if grep -qiE "already exists|conflict" /tmp/r2-create.log; then
            echo "  (bucket exists — fine)"
          fi
          npx wrangler queues create managed-agents-memory-events-staging 2>&1 \
            | tee /tmp/q-create.log || true
          if grep -qiE "already exists|conflict" /tmp/q-create.log; then
            echo "  (queue exists — fine)"
          fi
          # R2 event subscription. Skips silently if already configured.
          npx wrangler r2 bucket notification create managed-agents-memory-staging \
            --event-type object-create --event-type object-delete \
            --queue managed-agents-memory-events-staging 2>&1 \
            | tee /tmp/notif-create.log || true
          if grep -qiE "already exists|conflict|duplicate" /tmp/notif-create.log; then
            echo "  (event subscription exists — fine)"
          fi

      # Apply D1 migrations to the staging DB before any worker boots. Lanes
      # share staging data (KV / D1 / R2), so this targets the staging D1
      # binding via the lane wrangler config (env.staging override). Idempotent:
      # wrangler skips already-applied migration files. Without this step a new
      # migration that ships in the same commit hits production code paths
      # before the schema is in place — last incident: migration 0009 added
      # github_installations / github_publications, lane code queried them, D1
      # 500'd until manually applied.
      - name: Apply D1 migrations (staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          cd apps/main
          npx wrangler d1 migrations apply openma-auth-staging --remote \
            --config "wrangler.lane-${{ inputs.lane_name }}.jsonc"

      # Deploy order is constrained by a circular dependency: integrations
      # binds MAIN→main, main binds INTEGRATIONS→integrations and
      # SANDBOX_sandbox_default→agent. Cloudflare rejects service bindings
      # whose target worker doesn't yet exist, so we stage:
      #   1. integrations (stubbed: services array stripped) — workers exist
      #   2. agent (binds integrations, which now exists)
      #   3. main (binds integrations + agent, both exist)
      #   4. integrations re-deploy (now with MAIN binding to lane main)
      # jq is preinstalled on ubuntu-latest.
      #
      # `workers` input opts into single-worker redeploy when the lane is
      # already up and you only changed one app's code. Skips the whole
      # circular-binding dance — wrangler updates the script in place and the
      # bindings are already live from the prior full deploy. Pass e.g.
      # `workers=agent` to redeploy only the agent worker (~30s vs ~5min).
      - name: Deploy integrations worker (stub, no service bindings yet)
        if: contains(inputs.workers, 'all') || contains(inputs.workers, 'integrations')
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd apps/integrations
          jq 'del(.services)' "wrangler.lane-${{ inputs.lane_name }}.jsonc" \
            > "wrangler.lane-${{ inputs.lane_name }}.stub.jsonc"
          npx wrangler deploy --config "wrangler.lane-${{ inputs.lane_name }}.stub.jsonc"

      # Deploy main BEFORE agent — agent worker has a service binding to
      # main's `McpProxyRpc` WorkerEntrypoint class. CF resolves bindings
      # at request time; if agent goes live before main's entrypoint
      # exists, every cloud-MCP call fails until main catches up.
      # Rollback: agent first, then main. See deploy.yml for the same
      # rationale and full ordering invariant.
      - name: Deploy main worker
        if: contains(inputs.workers, 'all') || contains(inputs.workers, 'main')
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd apps/main
          npx wrangler deploy --config wrangler.lane-${{ inputs.lane_name }}.jsonc

      - name: Deploy agent worker
        if: contains(inputs.workers, 'all') || contains(inputs.workers, 'agent')
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd apps/agent
          npx wrangler deploy --config wrangler.lane-${{ inputs.lane_name }}.jsonc

      - name: Re-deploy integrations worker (full config, MAIN binding live)
        if: contains(inputs.workers, 'all') || contains(inputs.workers, 'integrations')
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd apps/integrations
          npx wrangler deploy --config wrangler.lane-${{ inputs.lane_name }}.jsonc

      # Propagate the secrets a lane needs to come up green. Skip empty values
      # silently — operators can `wrangler secret put` per worker post-hoc for
      # anything not in repo secrets.
      - name: Set worker secrets
        if: contains(inputs.workers, 'all')
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          LANE='${{ inputs.lane_name }}'
          MAIN="managed-agents-lane-$LANE"
          AGENT="sandbox-default-lane-$LANE"
          INT="managed-agents-integrations-lane-$LANE"

          set_secret() {
            local name="$1" worker="$2" value="$3"
            if [ -z "$value" ]; then
              echo "  · skip $name → $worker (no value in repo secrets)"
              return
            fi
            echo "$value" | npx wrangler secret put "$name" --name "$worker" >/dev/null
            echo "  ✓ set $name → $worker"
          }

          echo "Setting secrets on $MAIN:"
          set_secret API_KEY                      "$MAIN" "${{ secrets.API_KEY }}"
          set_secret ANTHROPIC_API_KEY            "$MAIN" "${{ secrets.ANTHROPIC_API_KEY }}"
          set_secret ANTHROPIC_BASE_URL           "$MAIN" "${{ secrets.ANTHROPIC_BASE_URL }}"
          set_secret BETTER_AUTH_SECRET           "$MAIN" "${{ secrets.BETTER_AUTH_SECRET }}"
          set_secret INTEGRATIONS_INTERNAL_SECRET "$MAIN" "${{ secrets.INTEGRATIONS_INTERNAL_SECRET }}"
          set_secret MCP_SIGNING_KEY              "$MAIN" "${{ secrets.MCP_SIGNING_KEY }}"
          set_secret INTERNAL_TOKEN               "$MAIN" "${{ secrets.INTERNAL_TOKEN }}"
          # Cloudflare-published always-pass Turnstile secret. Paired with the
          # always-pass site key set via vars in lane-generate.mjs. Lanes are
          # dev-only; prod's real Turnstile secret stays out of the lane.
          # https://developers.cloudflare.com/turnstile/troubleshooting/testing/
          set_secret TURNSTILE_SECRET_KEY         "$MAIN" "1x0000000000000000000000000000000AA"

          echo "Setting secrets on $AGENT:"
          set_secret API_KEY                      "$AGENT" "${{ secrets.API_KEY }}"
          set_secret ANTHROPIC_API_KEY            "$AGENT" "${{ secrets.ANTHROPIC_API_KEY }}"
          set_secret ANTHROPIC_BASE_URL           "$AGENT" "${{ secrets.ANTHROPIC_BASE_URL }}"
          set_secret INTERNAL_TOKEN               "$AGENT" "${{ secrets.INTERNAL_TOKEN }}"
          set_secret TAVILY_API_KEY               "$AGENT" "${{ secrets.TAVILY_API_KEY }}"
          # NOTE: agent worker no longer needs INTEGRATIONS_INTERNAL_SECRET.
          # AcpProxyHarness now talks to RuntimeRoom via cross-script DO
          # binding (apps/agent/wrangler.jsonc → script_name) instead of
          # going through main's /v1/internal/runtime-attach-harness endpoint.
          # Lane workers should follow the same pattern automatically once
          # they pick up the wrangler.jsonc cross-script binding.
          # R2 S3 API credentials for sandbox.ts FUSE mount mode. Without
          # these, mountMemoryStore + mountWorkspace fall back to localBucket
          # mode (writes don't persist to R2 — see sandbox.ts comment).
          set_secret R2_ACCESS_KEY_ID             "$AGENT" "${{ secrets.R2_ACCESS_KEY_ID }}"
          set_secret R2_SECRET_ACCESS_KEY         "$AGENT" "${{ secrets.R2_SECRET_ACCESS_KEY }}"
          set_secret R2_ENDPOINT                  "$AGENT" "${{ secrets.R2_ENDPOINT }}"

          echo "Setting secrets on $INT:"
          set_secret API_KEY                      "$INT" "${{ secrets.API_KEY }}"
          set_secret INTEGRATIONS_INTERNAL_SECRET "$INT" "${{ secrets.INTEGRATIONS_INTERNAL_SECRET }}"
          # MCP_SIGNING_KEY is required by WebCryptoAesGcm in the integrations
          # gateway (encrypts/decrypts vault tokens); without it any
          # /linear/publications/* or /github/publications/* call 500s with
          # "secret must be non-empty".
          set_secret MCP_SIGNING_KEY              "$INT" "${{ secrets.MCP_SIGNING_KEY }}"

      - name: Health check
        run: |
          URL="https://managed-agents-lane-${{ inputs.lane_name }}.${{ vars.CF_SUBDOMAIN }}.workers.dev"
          sleep 10
          for i in 1 2 3 4 5; do
            if curl -fsS "$URL/health" > /dev/null; then
              echo "✓ lane main healthy at $URL"
              exit 0
            fi
            echo "  attempt $i/5 — not ready, sleep 5s"
            sleep 5
          done
          echo "::error::lane main health check failed for $URL"
          exit 1

      - name: Summary
        if: always()
        run: |
          LANE='${{ inputs.lane_name }}'
          SUB='${{ vars.CF_SUBDOMAIN }}'
          MAIN_URL="https://managed-agents-lane-$LANE.$SUB.workers.dev"
          INT_URL="https://managed-agents-integrations-lane-$LANE.$SUB.workers.dev"
          AGENT_NAME="sandbox-default-lane-$LANE"
          {
            echo "## Lane \`$LANE\` deployed"
            echo ""
            echo "| Worker | URL / Name |"
            echo "|---|---|"
            echo "| Main | $MAIN_URL |"
            echo "| Integrations | $INT_URL |"
            echo "| Agent (service binding) | \`$AGENT_NAME\` |"
            echo ""
            echo "**Health**: \`$MAIN_URL/health\`"
            echo ""
            echo "⚠️  This lane writes to **production** KV / D1 / R2 / Vectorize. Treat its writes as prod writes."
            echo ""
            echo "Tear down with:"
            echo '```'
            echo "gh workflow run teardown-lane.yml -F lane_name=$LANE -F confirm=true"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
