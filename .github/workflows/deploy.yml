name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build console
        run: pnpm --filter managed-agents-console build

      # Wrangler config sanity gate — catches duplicate top-level keys
      # in any wrangler.jsonc (the JSONC last-write-wins footgun PR #28
      # hit, where a duplicate `durable_objects` block silently dropped
      # SESSION_DO + SANDBOX bindings on prod). Fail-fast: don't deploy
      # if any config has dup keys or dup binding names — every prior
      # case of these has been a real outage.
      - name: Lint wrangler.jsonc files (no duplicate keys / bindings)
        run: node scripts/lint-wrangler-jsonc.mjs

      # Apply D1 migrations BEFORE deploying any worker. New code that
      # references columns / tables added in this PR will start serving
      # traffic the moment the deploy step finishes, so the schema must
      # already be in place. Fail-fast: if the migration apply fails, the
      # deploy steps don't run — better than half-applied schema with
      # mismatched worker code.
      #
      # `wrangler d1 migrations apply` is idempotent: it tracks applied
      # names in `d1_migrations` and skips anything already done. So this
      # step is safe to run on every push, including no-op pushes.
      - name: Apply D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd apps/main
          # `--remote` targets the prod D1 (binding AUTH_DB). The CI runner
          # is non-interactive, so wrangler picks the default "yes" for the
          # "DB may be unavailable during migration" prompt.
          npx wrangler d1 migrations apply AUTH_DB --remote

      # Memory subsystem infra: the queue + DLQ + R2 event subscription
      # referenced by apps/main/wrangler.jsonc must exist before the main
      # worker can deploy (wrangler validates queue bindings at deploy
      # time and refuses with "Queue X does not exist"). All three
      # commands are idempotent — they tee output and swallow
      # already-exists / conflict errors. Mirrors the lane workflow.
      - name: Ensure memory subsystem infra exists (idempotent)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd apps/main
          npx wrangler r2 bucket create managed-agents-memory 2>&1 \
            | tee /tmp/r2-create.log || true
          if grep -qiE "already exists|conflict" /tmp/r2-create.log; then
            echo "  (bucket exists — fine)"
          fi
          npx wrangler queues create managed-agents-memory-events 2>&1 \
            | tee /tmp/q-create.log || true
          if grep -qiE "already exists|conflict" /tmp/q-create.log; then
            echo "  (queue exists — fine)"
          fi
          npx wrangler queues create managed-agents-memory-events-dlq 2>&1 \
            | tee /tmp/dlq-create.log || true
          if grep -qiE "already exists|conflict" /tmp/dlq-create.log; then
            echo "  (DLQ exists — fine)"
          fi
          # R2 event subscription wires bucket PUT/DELETE → queue so the
          # consumer in apps/main can reflect agent FUSE writes back into D1.
          npx wrangler r2 bucket notification create managed-agents-memory \
            --event-type object-create --event-type object-delete \
            --queue managed-agents-memory-events 2>&1 \
            | tee /tmp/notif-create.log || true
          if grep -qiE "already exists|conflict|duplicate" /tmp/notif-create.log; then
            echo "  (event subscription exists — fine)"
          fi
          # DLQ → main worker subscription. Wrangler's deploy step won't
          # create this idempotently — it bails the moment ANY consumer in
          # the wrangler.jsonc consumers[] already exists, so the new DLQ
          # subscription never lands. Add it explicitly here. "already
          # has a consumer" means we're done.
          npx wrangler queues consumer add managed-agents-memory-events-dlq \
            managed-agents --batch-size 10 --batch-timeout 30 --message-retries 1 2>&1 \
            | tee /tmp/dlq-consumer.log || true
          if grep -qiE "already has a consumer|already exists" /tmp/dlq-consumer.log; then
            echo "  (DLQ consumer subscription exists — fine)"
          fi

      # --- Deploy order: main FIRST, then agent. ---
      #
      # The agent worker has a service binding to main's `McpProxyRpc`
      # WorkerEntrypoint class (apps/agent/wrangler.jsonc → MAIN_MCP).
      # CF service bindings resolve at request time, not deploy time —
      # if agent goes live before main's new entrypoint exists, every
      # cloud-MCP call fails until main catches up. Forward order:
      #   main (entrypoint exists) → agent (binds to it).
      # ROLLBACK is the inverse: agent first (stop calling the new
      # entrypoint), then main (can safely revert the class). Manual
      # rollbacks must respect this; CF doesn't enforce it.
      - name: Deploy main worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
        run: |
          cd apps/main
          DOMAIN_FLAG=""
          if [ -n "$CUSTOM_DOMAIN" ]; then
            DOMAIN_FLAG="--domain $CUSTOM_DOMAIN"
            echo "Deploying with custom domain: $CUSTOM_DOMAIN"
          fi
          for i in 1 2 3; do
            if npx wrangler deploy --config wrangler.jsonc $DOMAIN_FLAG; then
              echo "Main worker deployed successfully"
              break
            fi
            echo "Attempt $i/3 failed, waiting 60s before retry..."
            sleep 60
            if [ "$i" = "3" ]; then echo "All attempts failed"; exit 1; fi
          done

      - name: Deploy agent worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd apps/agent
          for i in 1 2 3; do
            if npx wrangler deploy --config wrangler.jsonc; then
              echo "Agent worker deployed successfully"
              exit 0
            fi
            echo "Attempt $i/3 failed, waiting 60s before retry..."
            sleep 60
          done
          echo "All attempts failed"
          exit 1

      # AcpProxyHarness in the agent worker calls main's /v1/internal/*
      # endpoints (runtime-attach-harness, runtime-session-bundle), gated
      # on this header secret. The "Sync ..." step at the end of this job
      # makes sure agent + main + integrations all carry the same value
      # from the GH repo secret — first observed missing on agent in
      # prod, manifesting as "INTEGRATIONS_INTERNAL_SECRET unset" the
      # moment a runtime-bound agent sent its first turn after a
      # standalone agent-worker rebuild.

      # Integrations worker is the inbound webhook surface for Slack /
      # Linear / GitHub. Its custom domain (integrations.openma.dev) is
      # already pinned in wrangler.jsonc routes — no DOMAIN_FLAG needed.
      - name: Deploy integrations worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd apps/integrations
          for i in 1 2 3; do
            if npx wrangler deploy --config wrangler.jsonc; then
              echo "Integrations worker deployed successfully"
              exit 0
            fi
            echo "Attempt $i/3 failed, waiting 60s before retry..."
            sleep 60
          done
          echo "All attempts failed"
          exit 1

      # Consolidated secret sync — run AFTER all three deploys so the new
      # bindings (if any) are live before we set values against them. For
      # rotation of an existing secret the order doesn't matter (CF
      # replaces atomically; both old and new code read the same name).
      #
      # Why GH secret as source of truth (vs manual `wrangler secret put`):
      # the original prod was missing INTEGRATIONS_INTERNAL_SECRET on the
      # agent worker because `wrangler secret put` had only ever been run
      # against main and integrations — no codified record meant a worker
      # rebuild silently dropped the secret. Pushing the same GH-stored
      # value to the workers that need it on every deploy makes drift
      # impossible: set the GH secret once, every subsequent push
      # reconciles them to that value.
      #
      # Scope: only main + integrations. The agent worker no longer needs
      # this secret after AcpProxyHarness was rewired to talk to the
      # RuntimeRoom DO directly via cross-script binding (see
      # apps/agent/wrangler.jsonc and apps/agent/src/harness/acp-proxy-loop.ts).
      # If you re-introduce a main HTTP call from agent, add the agent
      # worker back to this loop.
      #
      # Idempotent: when the value already matches the existing secret,
      # `wrangler secret put` re-encrypts to the same plaintext — no error.
      # `if` guard skips the whole step when the GH secret is unset, so a
      # repo where INTEGRATIONS_INTERNAL_SECRET hasn't been added yet
      # deploys cleanly without clobbering existing manually-set values.
      - name: Sync INTEGRATIONS_INTERNAL_SECRET to all workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          INTEGRATIONS_INTERNAL_SECRET: ${{ secrets.INTEGRATIONS_INTERNAL_SECRET }}
        if: ${{ env.INTEGRATIONS_INTERNAL_SECRET != '' }}
        run: |
          set -e
          for entry in "apps/main:managed-agents" "apps/integrations:managed-agents-integrations"; do
            dir="${entry%%:*}"
            worker="${entry##*:}"
            (cd "$dir" && echo "$INTEGRATIONS_INTERNAL_SECRET" | npx wrangler secret put INTEGRATIONS_INTERNAL_SECRET --name "$worker" >/dev/null)
            echo "  ✓ $worker"
          done
          echo "✓ INTEGRATIONS_INTERNAL_SECRET synced to main + integrations"

      # --- Post-deploy verification ---
      - name: Verify deployment
        env:
          API_KEY: ${{ secrets.API_KEY }}
          CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
          WORKERS_URL: https://managed-agents.${{ vars.CF_SUBDOMAIN }}.workers.dev
        run: |
          sleep 5
          # Try custom domain first, fall back to workers.dev
          if [ -n "$CUSTOM_DOMAIN" ]; then
            echo "Trying custom domain: https://$CUSTOM_DOMAIN/health"
            HEALTH=$(curl -sf "https://$CUSTOM_DOMAIN/health" 2>/dev/null) && { echo "Post-deploy health (custom): $HEALTH"; exit 0; }
            echo "Custom domain not ready yet, falling back to workers.dev"
          fi
          echo "Checking: $WORKERS_URL/health"
          HEALTH=$(curl -sf "$WORKERS_URL/health")
          echo "Post-deploy health: $HEALTH"
