name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build console
        run: pnpm --filter managed-agents-console build

      # Apply D1 migrations BEFORE deploying any worker. New code that
      # references columns / tables added in this PR will start serving
      # traffic the moment the deploy step finishes, so the schema must
      # already be in place. Fail-fast: if the migration apply fails, the
      # deploy steps don't run — better than half-applied schema with
      # mismatched worker code.
      #
      # `wrangler d1 migrations apply` is idempotent: it tracks applied
      # names in `d1_migrations` and skips anything already done. So this
      # step is safe to run on every push, including no-op pushes.
      - name: Apply D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd apps/main
          # `--remote` targets the prod D1 (binding AUTH_DB). The CI runner
          # is non-interactive, so wrangler picks the default "yes" for the
          # "DB may be unavailable during migration" prompt.
          npx wrangler d1 migrations apply AUTH_DB --remote

      # Memory subsystem infra: the queue + DLQ + R2 event subscription
      # referenced by apps/main/wrangler.jsonc must exist before the main
      # worker can deploy (wrangler validates queue bindings at deploy
      # time and refuses with "Queue X does not exist"). All three
      # commands are idempotent — they tee output and swallow
      # already-exists / conflict errors. Mirrors the lane workflow.
      - name: Ensure memory subsystem infra exists (idempotent)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd apps/main
          npx wrangler r2 bucket create managed-agents-memory 2>&1 \
            | tee /tmp/r2-create.log || true
          if grep -qiE "already exists|conflict" /tmp/r2-create.log; then
            echo "  (bucket exists — fine)"
          fi
          npx wrangler queues create managed-agents-memory-events 2>&1 \
            | tee /tmp/q-create.log || true
          if grep -qiE "already exists|conflict" /tmp/q-create.log; then
            echo "  (queue exists — fine)"
          fi
          npx wrangler queues create managed-agents-memory-events-dlq 2>&1 \
            | tee /tmp/dlq-create.log || true
          if grep -qiE "already exists|conflict" /tmp/dlq-create.log; then
            echo "  (DLQ exists — fine)"
          fi
          # R2 event subscription wires bucket PUT/DELETE → queue so the
          # consumer in apps/main can reflect agent FUSE writes back into D1.
          npx wrangler r2 bucket notification create managed-agents-memory \
            --event-type object-create --event-type object-delete \
            --queue managed-agents-memory-events 2>&1 \
            | tee /tmp/notif-create.log || true
          if grep -qiE "already exists|conflict|duplicate" /tmp/notif-create.log; then
            echo "  (event subscription exists — fine)"
          fi

      # --- Deploy both workers with retry ---
      - name: Deploy agent worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd apps/agent
          for i in 1 2 3; do
            if npx wrangler deploy --config wrangler.jsonc; then
              echo "Agent worker deployed successfully"
              exit 0
            fi
            echo "Attempt $i/3 failed, waiting 60s before retry..."
            sleep 60
          done
          echo "All attempts failed"
          exit 1

      - name: Deploy main worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
        run: |
          cd apps/main
          DOMAIN_FLAG=""
          if [ -n "$CUSTOM_DOMAIN" ]; then
            DOMAIN_FLAG="--domain $CUSTOM_DOMAIN"
            echo "Deploying with custom domain: $CUSTOM_DOMAIN"
          fi
          for i in 1 2 3; do
            if npx wrangler deploy --config wrangler.jsonc $DOMAIN_FLAG; then
              echo "Main worker deployed successfully"
              break
            fi
            echo "Attempt $i/3 failed, waiting 60s before retry..."
            sleep 60
            if [ "$i" = "3" ]; then echo "All attempts failed"; exit 1; fi
          done

      # Integrations worker is the inbound webhook surface for Slack /
      # Linear / GitHub. Its custom domain (integrations.openma.dev) is
      # already pinned in wrangler.jsonc routes — no DOMAIN_FLAG needed.
      - name: Deploy integrations worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd apps/integrations
          for i in 1 2 3; do
            if npx wrangler deploy --config wrangler.jsonc; then
              echo "Integrations worker deployed successfully"
              exit 0
            fi
            echo "Attempt $i/3 failed, waiting 60s before retry..."
            sleep 60
          done
          echo "All attempts failed"
          exit 1

      # --- Post-deploy verification ---
      - name: Verify deployment
        env:
          API_KEY: ${{ secrets.API_KEY }}
          CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
          WORKERS_URL: https://managed-agents.${{ vars.CF_SUBDOMAIN }}.workers.dev
        run: |
          sleep 5
          # Try custom domain first, fall back to workers.dev
          if [ -n "$CUSTOM_DOMAIN" ]; then
            echo "Trying custom domain: https://$CUSTOM_DOMAIN/health"
            HEALTH=$(curl -sf "https://$CUSTOM_DOMAIN/health" 2>/dev/null) && { echo "Post-deploy health (custom): $HEALTH"; exit 0; }
            echo "Custom domain not ready yet, falling back to workers.dev"
          fi
          echo "Checking: $WORKERS_URL/health"
          HEALTH=$(curl -sf "$WORKERS_URL/health")
          echo "Post-deploy health: $HEALTH"
