name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build console
        run: cd apps/console && pnpm install && npx vite build

      # --- Deploy both workers with retry ---
      - name: Deploy agent worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd apps/agent
          for i in 1 2 3; do
            if npx wrangler deploy --config wrangler.jsonc; then
              echo "Agent worker deployed successfully"
              exit 0
            fi
            echo "Attempt $i/3 failed, waiting 60s before retry..."
            sleep 60
          done
          echo "All attempts failed"
          exit 1

      - name: Deploy main worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd apps/main
          for i in 1 2 3; do
            if npx wrangler deploy --config wrangler.jsonc; then
              echo "Main worker deployed successfully"
              exit 0
            fi
            echo "Attempt $i/3 failed, waiting 60s before retry..."
            sleep 60
          done
          echo "All attempts failed"
          exit 1

      # --- Post-deploy verification ---
      - name: Verify deployment
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          sleep 5
          HEALTH=$(curl -sf "${{ vars.MAIN_WORKER_URL }}/health")
          echo "Post-deploy health: $HEALTH"
