name: Publish CLI

# Publishes @openma/cli to npm via OIDC trusted publisher (no NPM_TOKEN
# required). The trust relationship is configured on npmjs.com:
#   Package: @openma/cli
#   Repo:    open-ma/open-managed-agents
#   Workflow filename: publish-cli.yml
#   Environment: production
#
# To use:
#   - Manual: Actions → "Publish CLI" → Run workflow → pick dist-tag
#   - Tag push: git tag cli-v0.1.0-beta.1 && git push --tags

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag (beta, latest, next, etc.)'
        type: string
        default: 'beta'
        required: true
  push:
    tags:
      - 'cli-v*'

concurrency:
  group: publish-cli-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    # Must match the environment configured in npm's trusted publisher
    # settings, otherwise OIDC verification fails with "audience mismatch".
    environment: production
    permissions:
      contents: read
      # Required for OIDC: GitHub mints a short-lived signed JWT that npm
      # verifies against the trusted-publisher config. Without this,
      # npm publish falls back to NPM_TOKEN auth and fails (no token here).
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 24 ships with npm 11.x which has OIDC publish auto-
          # detection. Node 22 LTS still ships npm 10.x which falls back
          # to the bogus NODE_AUTH_TOKEN placeholder and gets a 404 from
          # the registry. Stay on 24 here even if other workflows pin to
          # 22 — this one needs npm 11.5.1+.
          node-version: '24'
          # Required for `npm publish` to use the OIDC token. Setting this
          # writes the registry to ~/.npmrc and authenticates via the OIDC
          # flow at publish time. Do NOT set NODE_AUTH_TOKEN env var here —
          # that would override OIDC with a static token.
          registry-url: 'https://registry.npmjs.org'

      - name: Confirm npm has OIDC support
        run: |
          NPM_VER=$(npm --version)
          echo "npm version: $NPM_VER"
          # OIDC publish landed in 11.5.1 — fail fast with a useful message
          # if we somehow got an older npm.
          node -e "
            const [maj,min,pat] = process.argv[1].split('.').map(Number);
            const ok = maj > 11 || (maj === 11 && (min > 5 || (min === 5 && pat >= 1)));
            if (!ok) { console.error('Need npm >= 11.5.1 for OIDC publish'); process.exit(1); }
          " "$NPM_VER"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm --filter @openma/cli build

      # Debug: dump the OIDC token claims (not the token itself) so we can
      # verify what npm sees vs what the trusted publisher expects. Remove
      # once OIDC publishes are stable.
      - name: Debug OIDC claims
        if: always()
        continue-on-error: true
        run: |
          set +e
          if [ -z "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            echo "ACTIONS_ID_TOKEN_REQUEST_URL is not set — id-token: write permission is missing"
            exit 0
          fi
          RESP=$(curl -sSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            -H "Accept: application/json" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org")
          TOKEN=$(echo "$RESP" | jq -r '.value // empty')
          if [ -z "$TOKEN" ]; then
            echo "Failed to mint OIDC token. Raw response:"
            echo "$RESP"
            exit 0
          fi
          PAYLOAD_B64=$(echo "$TOKEN" | cut -d. -f2)
          # JWT base64url → base64 (replace - with +, _ with /, pad with =)
          PAYLOAD_B64_PADDED="${PAYLOAD_B64}$(printf '%*s' $(( (4 - ${#PAYLOAD_B64} % 4) % 4 )) '' | tr ' ' '=')"
          PAYLOAD=$(echo "$PAYLOAD_B64_PADDED" | tr '_-' '/+' | base64 -d 2>/dev/null)
          if [ -z "$PAYLOAD" ]; then
            echo "Failed to decode JWT payload"
            exit 0
          fi
          echo "OIDC claims (sanitized):"
          echo "$PAYLOAD" | jq '{
            sub,
            aud,
            iss,
            repository,
            repository_owner,
            workflow,
            workflow_ref,
            job_workflow_ref,
            environment,
            ref,
            ref_type,
            event_name
          }'

      - name: Publish to npm
        # --provenance signs the package with a Sigstore attestation linking
        # it to this workflow run + commit SHA. Users can verify with
        # `npm audit signatures`. Requires id-token: write (above).
        #
        # The dist-tag picks where the version lands: `beta` keeps it off
        # the default install path (`npm i @pkg` won't grab beta unless
        # `@beta` is appended); `latest` makes it the default.
        run: |
          cd packages/cli
          npm publish --tag "${TAG}" --provenance --access public
        env:
          # workflow_dispatch input fallback to 'beta' for tag-push runs.
          TAG: ${{ inputs.tag || 'beta' }}
          # Explicitly clear setup-node's NODE_AUTH_TOKEN placeholder so
          # npm sees no static token and falls back to OIDC. Without this,
          # the literal "XXXXX-XXXXX-..." string lands in the Authorization
          # header and the registry returns a 404-disguised-as-401.
          NODE_AUTH_TOKEN: ''

      - name: Summary
        run: |
          {
            echo "## Published @openma/cli"
            echo ""
            echo "- **Version**: \`$(node -p "require('./packages/cli/package.json').version")\`"
            echo "- **Tag**: \`${TAG}\`"
            echo "- **Install**: \`npm i -g @openma/cli@${TAG}\`"
            echo "- **Page**: https://www.npmjs.com/package/@openma/cli"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          TAG: ${{ inputs.tag || 'beta' }}
