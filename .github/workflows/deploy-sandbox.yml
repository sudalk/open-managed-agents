name: Deploy Sandbox Worker

on:
  workflow_dispatch:
    inputs:
      env_id:
        description: 'Environment ID'
        required: true
        type: string
      packages_json:
        description: 'Packages JSON (e.g. {"pip":["pandas"],"apt":["ffmpeg"]})'
        required: false
        type: string
        default: '{}'
      callback_url:
        description: 'Callback URL for build result (passed by Worker)'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Dockerfile and wrangler config
        run: |
          cd apps/agent
          bash generate.sh \
            "${{ inputs.env_id }}" \
            "${{ vars.KV_NAMESPACE_ID }}" \
            '${{ inputs.packages_json }}'

      - name: Deploy sandbox worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          BUILD_DIR="apps/agent/build-${{ inputs.env_id }}"
          cd "$BUILD_DIR"
          npx wrangler deploy --config wrangler.jsonc

      - name: Set sandbox worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          WORKER_NAME="sandbox-${{ inputs.env_id }}"
          echo "${{ secrets.ANTHROPIC_API_KEY }}" | npx wrangler secret put ANTHROPIC_API_KEY --name "$WORKER_NAME"
          echo "${{ secrets.API_KEY }}" | npx wrangler secret put API_KEY --name "$WORKER_NAME"
          if [ -n "${{ secrets.ANTHROPIC_BASE_URL }}" ]; then
            echo "${{ secrets.ANTHROPIC_BASE_URL }}" | npx wrangler secret put ANTHROPIC_BASE_URL --name "$WORKER_NAME"
          fi
          if [ -n "${{ secrets.ANTHROPIC_MODEL }}" ]; then
            echo "${{ secrets.ANTHROPIC_MODEL }}" | npx wrangler secret put ANTHROPIC_MODEL --name "$WORKER_NAME"
          fi

      - name: Notify main worker
        if: always()
        run: |
          STATUS="ready"
          ERROR=""
          if [ "${{ job.status }}" != "success" ]; then
            STATUS="error"
            ERROR="GitHub Actions build failed"
          fi

          curl -fsS -X POST \
            "${{ inputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${{ secrets.API_KEY }}" \
            -d "{
              \"status\": \"${STATUS}\",
              \"sandbox_worker_name\": \"sandbox-${{ inputs.env_id }}\",
              \"error\": \"${ERROR}\"
            }" || echo "Callback failed (non-fatal)"
